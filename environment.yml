name: methymarker

channels:
  - conda-forge
  - bioconda
  - defaults

dependencies:
  # =========================================================
  # Python
  # =========================================================
  - python=3.11

  # =========================================================
  # Core data analysis
  # =========================================================
  - pandas
  - numpy
  - scipy
  - statsmodels

  # =========================================================
  # Parquet / Arrow
  # =========================================================
  - pyarrow
  - fastparquet

  # =========================================================
  # Web requests / APIs
  # =========================================================
  - requests
  - mygene

  # =========================================================
  # Genomic annotation
  # =========================================================
  - gtfparse

  # =========================================================
  # Database
  # =========================================================
  - sqlalchemy
  - psycopg2
  - psycopg2-binary

  # =========================================================
  # Streamlit app
  # =========================================================
  - streamlit
  - plotly
  - altair

  # =========================================================
  # Utilities
  # =========================================================
  - tqdm
  - python-dotenv
  - openpyxl

  # =========================================================
  # Optional notebooks / development
  # =========================================================
  - ipykernel
  - jupyterlab

  # =========================================================
  # R base for leukocyte preprocessing script
  # =========================================================
  - r-base
  - r-essentials
  - r-arrow
  - r-dplyr
  - r-readr
  - r-tibble
  - r-stringr

  # =========================================================
  # Pip-only packages if needed
  # =========================================================
  - pip
  - pip:
      - streamlit-option-menu
